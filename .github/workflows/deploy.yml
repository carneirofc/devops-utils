name: Publish to PyPI

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tags needed for hatch-vcs versioning

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
